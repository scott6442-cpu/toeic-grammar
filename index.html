<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOEIC Part 5 Lab</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-soft: #f2f6f8;
      --ink: #20232a;
      --muted: #68707d;
      --line: #dfe5eb;
      --line-strong: #cbd5df;
      --teal: #177e89;
      --teal-soft: #d9f0f1;
      --blue: #2f6fbd;
      --blue-soft: #e2ecfb;
      --amber: #b7791f;
      --amber-soft: #fff1d6;
      --rose: #bd4b5f;
      --rose-soft: #fde2e7;
      --violet: #7656a8;
      --violet-soft: #ece5f6;
      --green: #2f7d55;
      --green-soft: #ddf2e5;
      --slate: #4b5563;
      --slate-soft: #edf0f3;
      --danger: #c43d3d;
      --danger-soft: #fde5e5;
      --shadow: 0 12px 28px rgba(25, 38, 55, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(180deg, rgba(47, 111, 189, 0.08), transparent 260px),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", system-ui, -apple-system, sans-serif;
      letter-spacing: 0;
    }

    button,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 0 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: conic-gradient(from 210deg, var(--teal), var(--blue), var(--violet), var(--teal));
      color: #fff;
      font-weight: 900;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn,
    .icon-btn,
    .select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .btn {
      padding: 0 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .icon-btn {
      width: 42px;
      display: inline-grid;
      place-items: center;
      font-size: 19px;
      line-height: 1;
    }

    .btn:hover,
    .icon-btn:hover,
    .select:hover {
      border-color: var(--line-strong);
      background: #f9fbfd;
    }

    .btn:active,
    .icon-btn:active {
      transform: translateY(1px);
    }

    .btn.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .btn.danger {
      color: var(--danger);
      border-color: #efb3b3;
      background: var(--danger-soft);
    }

    .segmented {
      display: inline-grid;
      grid-auto-flow: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }

    .segmented button {
      min-height: 40px;
      padding: 0 12px;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented button.active {
      background: var(--ink);
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }

    .panel,
    .question-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 900;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .select {
      width: 100%;
      padding: 0 10px;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 16px) 17px,
        calc(100% - 11px) 17px;
      background-size: 5px 5px;
      background-repeat: no-repeat;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .stat {
      min-height: 76px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .stat-label {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .question-shell {
      overflow: hidden;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      align-items: center;
    }

    .question-index {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .number {
      font-size: 24px;
      font-weight: 950;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .tone-teal { background: var(--teal-soft); color: var(--teal); }
    .tone-blue { background: var(--blue-soft); color: var(--blue); }
    .tone-amber { background: var(--amber-soft); color: var(--amber); }
    .tone-rose { background: var(--rose-soft); color: var(--rose); }
    .tone-violet { background: var(--violet-soft); color: var(--violet); }
    .tone-green { background: var(--green-soft); color: var(--green); }
    .tone-slate { background: var(--slate-soft); color: var(--slate); }

    .progress-wrap {
      min-width: 160px;
      text-align: right;
    }

    .progress-line {
      height: 8px;
      border-radius: 999px;
      background: var(--line);
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--blue));
      transition: width 0.2s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .question-body {
      padding: 24px 20px 20px;
    }

    .sentence {
      min-height: 118px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, #f7fafb);
      font-size: clamp(20px, 2.6vw, 30px);
      line-height: 1.48;
      font-weight: 800;
    }

    .blank {
      display: inline-block;
      min-width: 128px;
      padding: 0 8px 3px;
      text-align: center;
      color: var(--blue);
      border-bottom: 3px solid var(--blue);
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .choice {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      align-items: center;
      min-height: 58px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      overflow: hidden;
    }

    .choice:hover {
      border-color: var(--blue);
      background: #f6f9ff;
    }

    .choice-letter {
      height: 100%;
      display: grid;
      place-items: center;
      background: var(--panel-soft);
      color: var(--muted);
      font-weight: 950;
    }

    .choice-text {
      padding: 13px 14px;
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .choice.correct {
      border-color: #84c69b;
      background: var(--green-soft);
    }

    .choice.correct .choice-letter {
      background: var(--green);
      color: #fff;
    }

    .choice.wrong {
      border-color: #e7a4a4;
      background: var(--danger-soft);
    }

    .choice.wrong .choice-letter {
      background: var(--danger);
      color: #fff;
    }

    .choice.dimmed {
      opacity: 0.62;
    }

    .feedback {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fbfcfd;
    }

    .feedback.show {
      display: block;
    }

    .feedback-title {
      font-weight: 950;
      margin-bottom: 7px;
    }

    .feedback-text {
      color: var(--muted);
      line-height: 1.6;
    }

    .explain-grid {
      display: grid;
      gap: 10px;
    }

    .explain-block {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .explain-block summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 11px 12px;
      cursor: pointer;
      list-style: none;
    }

    .explain-block summary::-webkit-details-marker {
      display: none;
    }

    .explain-block summary::after {
      content: "+";
      color: var(--muted);
      font-weight: 950;
    }

    .explain-block[open] summary::after {
      content: "-";
    }

    .explain-content {
      padding: 0 12px 12px;
    }

    .explain-label {
      display: inline-flex;
      color: var(--ink);
      font-size: 12px;
      font-weight: 950;
      white-space: normal;
    }

    .explain-block strong {
      color: var(--ink);
    }

    .focus-card {
      margin-bottom: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fbfc;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.5;
    }

    .weakness-panel {
      display: grid;
      gap: 10px;
    }

    .weakness-summary {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.5;
    }

    .weak-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .weak-name {
      font-size: 13px;
      font-weight: 900;
    }

    .weak-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .weak-rate {
      min-width: 54px;
      text-align: right;
      color: var(--danger);
      font-size: 16px;
      font-weight: 950;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
    }

    .nav-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
    }

    .sheet-btn {
      aspect-ratio: 1;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .sheet-btn.active {
      border-color: var(--ink);
      color: var(--ink);
      background: #eef2f7;
    }

    .sheet-btn.correct {
      border-color: #90caa3;
      color: var(--green);
      background: var(--green-soft);
    }

    .sheet-btn.wrong {
      border-color: #e8a1a1;
      color: var(--danger);
      background: var(--danger-soft);
    }

    .chart {
      display: grid;
      gap: 9px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .bar-track {
      height: 10px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
    }

    .bar-fill.tone-teal { background: var(--teal); }
    .bar-fill.tone-blue { background: var(--blue); }
    .bar-fill.tone-amber { background: var(--amber); }
    .bar-fill.tone-rose { background: var(--rose); }
    .bar-fill.tone-violet { background: var(--violet); }
    .bar-fill.tone-green { background: var(--green); }
    .bar-fill.tone-slate { background: var(--slate); }

    .empty {
      padding: 18px;
      border-radius: var(--radius);
      border: 1px dashed var(--line-strong);
      color: var(--muted);
      text-align: center;
      font-weight: 800;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: var(--ink);
      color: #fff;
      padding: 11px 14px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-weight: 800;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 260px minmax(0, 1fr);
      }

      .aside-right {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 16px;
      }
    }

    @media (max-width: 820px) {
      .app {
        padding: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .layout,
      .aside-right {
        grid-template-columns: 1fr;
      }

      .question-head,
      .nav-row {
        flex-direction: column;
        align-items: stretch;
      }

      .progress-wrap {
        text-align: left;
      }

      .segmented {
        width: 100%;
        grid-auto-flow: row;
      }

      .segmented button {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .segmented button:last-child {
        border-bottom: 0;
      }

      .sentence {
        min-height: 148px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">P5</div>
        <div>
          <h1>TOEIC Part 5 Lab</h1>
          <div class="subtitle" id="bankSubtitle">1000 questions · 34 sets</div>
        </div>
      </div>
      <div class="toolbar">
        <div class="segmented" aria-label="mode">
          <button type="button" data-mode="set" class="active">세트</button>
          <button type="button" data-mode="random">랜덤</button>
          <button type="button" data-mode="wrong">오답</button>
          <button type="button" data-mode="bookmarked">북마크</button>
        </div>
        <button type="button" class="btn danger" id="resetBtn">초기화</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <h2 class="panel-title">Session</h2>
        <div class="controls">
          <label class="field">
            <span class="label">SET</span>
            <select class="select" id="setSelect"></select>
          </label>
          <label class="field">
            <span class="label">CATEGORY</span>
            <select class="select" id="categorySelect">
              <option value="all">전체</option>
            </select>
          </label>
          <label class="field">
            <span class="label">LEVEL</span>
            <select class="select" id="difficultySelect">
              <option value="all">전체</option>
            </select>
          </label>
          <label class="field">
            <span class="label">SIZE</span>
            <select class="select" id="sizeSelect">
              <option value="30">30</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
          <button type="button" class="btn primary" id="buildBtn">불러오기</button>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-value" id="answeredStat">0</div>
            <div class="stat-label">ANSWERED</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="accuracyStat">0%</div>
            <div class="stat-label">ACCURACY</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="wrongStat">0</div>
            <div class="stat-label">WRONG</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="bookmarkStat">0</div>
            <div class="stat-label">SAVED</div>
          </div>
        </div>
      </aside>

      <section class="question-shell" aria-live="polite">
        <div class="question-head">
          <div class="question-index">
            <span class="number" id="questionNumber">101</span>
            <span class="badge tone-teal" id="categoryBadge">품사/어형</span>
            <span class="badge tone-slate" id="difficultyBadge">실전</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-text" id="progressText">1 / 30</div>
            <div class="progress-line">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>

        <div class="question-body" id="questionBody">
          <div class="sentence" id="sentence"></div>
          <div class="choices" id="choices"></div>
          <div class="feedback" id="feedback">
            <div class="feedback-title" id="feedbackTitle"></div>
            <div class="feedback-text" id="feedbackText"></div>
          </div>
        </div>

        <div class="nav-row">
          <div class="nav-group">
            <button type="button" class="icon-btn" id="prevBtn" title="이전" aria-label="이전">‹</button>
            <button type="button" class="icon-btn" id="nextBtn" title="다음" aria-label="다음">›</button>
          </div>
          <div class="nav-group">
            <button type="button" class="btn" id="bookmarkBtn">북마크</button>
            <button type="button" class="btn" id="clearAnswerBtn">답 지우기</button>
          </div>
        </div>
      </section>

      <aside class="aside-right">
        <section class="panel">
          <h2 class="panel-title">Answer Sheet</h2>
          <div class="sheet-grid" id="sheetGrid"></div>
        </section>

        <section class="panel">
          <h2 class="panel-title">Pattern Mix</h2>
          <div class="chart" id="chart"></div>
        </section>

        <section class="panel">
          <h2 class="panel-title">Weakness Report</h2>
          <div class="weakness-panel" id="weaknessPanel"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="part5-bank.js"></script>
  <script>
    const STORAGE_KEY = "toeic_part5_lab_v1";
    const letters = ["A", "B", "C", "D"];
    const bank = globalThis.PART5_BANK || [];
    const meta = globalThis.PART5_META || { categories: {}, difficulties: {} };

    const els = {
      bankSubtitle: document.getElementById("bankSubtitle"),
      setSelect: document.getElementById("setSelect"),
      categorySelect: document.getElementById("categorySelect"),
      difficultySelect: document.getElementById("difficultySelect"),
      sizeSelect: document.getElementById("sizeSelect"),
      buildBtn: document.getElementById("buildBtn"),
      resetBtn: document.getElementById("resetBtn"),
      questionNumber: document.getElementById("questionNumber"),
      categoryBadge: document.getElementById("categoryBadge"),
      difficultyBadge: document.getElementById("difficultyBadge"),
      progressText: document.getElementById("progressText"),
      progressFill: document.getElementById("progressFill"),
      sentence: document.getElementById("sentence"),
      choices: document.getElementById("choices"),
      feedback: document.getElementById("feedback"),
      feedbackTitle: document.getElementById("feedbackTitle"),
      feedbackText: document.getElementById("feedbackText"),
      sheetGrid: document.getElementById("sheetGrid"),
      chart: document.getElementById("chart"),
      answeredStat: document.getElementById("answeredStat"),
      accuracyStat: document.getElementById("accuracyStat"),
      wrongStat: document.getElementById("wrongStat"),
      bookmarkStat: document.getElementById("bookmarkStat"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      bookmarkBtn: document.getElementById("bookmarkBtn"),
      clearAnswerBtn: document.getElementById("clearAnswerBtn"),
      weaknessPanel: document.getElementById("weaknessPanel"),
      toast: document.getElementById("toast")
    };

    const state = loadState();
    let session = [];
    let currentIndex = 0;
    let mode = "set";

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { answers: {}, bookmarks: [] };
      } catch {
        return { answers: {}, bookmarks: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function seededShuffle(items, seed) {
      const arr = items.slice();
      let s = seed || 8849;
      for (let i = arr.length - 1; i > 0; i--) {
        s = (s * 48271) % 2147483647;
        const j = s % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatMultiline(text) {
      return escapeHtml(text).replaceAll("\n", "<br>");
    }

    function renderSentence(text) {
      return escapeHtml(text).replace(/_{3,}|-{3,}|•/g, '<span class="blank">_____</span>');
    }

    function filledSentence(q, correctText) {
      return q.q.replace(/_{3,}|-{3,}|•/g, correctText);
    }

    function studyFocus(q) {
      const map = {
        word_form: "품사 자리 판단: 빈칸 앞뒤를 보고 명사·형용사·부사·동사 중 필요한 역할을 먼저 확정하세요.",
        connector: "연결어 판단: 빈칸 뒤가 절인지 구인지 확인한 뒤, 원인·양보·조건·목적 의미를 맞추세요.",
        preposition: "전치사 판단: 뒤 명사구와 앞 표현이 시간·장소·대상·원인 중 어떤 관계인지 잡으세요.",
        pronoun: "대명사 판단: 뒤 명사의 유무, 단수/복수, 소유격, 재귀 관계를 순서대로 확인하세요.",
        comparison: "비교 표현 판단: than은 비교급, the나 범위 표현은 최상급 신호입니다.",
        collocation: "어휘 결합 판단: 목적어가 실제로 요구하는 동사와 의미역을 확인하세요.",
        verb_form: "동사 형태 판단: 조동사, 완료, 수동태, 전치사 뒤 구조가 동사 모양을 결정합니다."
      };
      return map[q.category] || "빈칸 앞뒤의 구조와 의미를 함께 확인하세요.";
    }

    function explainBlock(label, html, open = false) {
      return `
        <details class="explain-block" ${open ? "open" : ""}>
          <summary><span class="explain-label">${escapeHtml(label)}</span></summary>
          <div class="explain-content">${html}</div>
        </details>
      `;
    }

    function explanationHtml(q, saved, correctIndex) {
      const selected = saved ? q.choices[saved.choiceIndex] : null;
      const correct = q.choices[correctIndex];
      const translation = q.translation || filledSentence(q, correct.text);
      const reason = q.detailedExplanation || q.explanation;
      const concept = q.concept || "빈칸 앞뒤의 문장 성분과 의미 관계를 함께 확인해야 합니다.";
      const distractors = q.distractorExplanation || "";
      const blocks = [];

      blocks.push(`<div class="focus-card">${escapeHtml(studyFocus(q))}</div>`);
      blocks.push(explainBlock("해석", escapeHtml(translation), true));

      if (saved && !saved.correct) {
        blocks.push(explainBlock("내 선택이 틀린 이유", escapeHtml(selected?.wrongReason || "선택한 답은 문맥과 구조에 맞지 않습니다."), true));
      }

      blocks.push(explainBlock("정답 근거", `${escapeHtml(reason)}<br><strong>정답: ${escapeHtml(correct.text)}</strong>`, true));
      blocks.push(explainBlock("관련 문법 개념", escapeHtml(concept), false));

      if (distractors) {
        blocks.push(explainBlock("오답 포인트", formatMultiline(distractors), false));
      }

      return `<div class="explain-grid">${blocks.join("")}</div>`;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1600);
    }

    function populateControls() {
      els.bankSubtitle.textContent = `${meta.total || bank.length} questions · ${meta.sets || 34} sets`;

      for (let i = 1; i <= (meta.sets || 12); i++) {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `Set ${i}`;
        els.setSelect.appendChild(opt);
      }

      Object.entries(meta.categories || {}).forEach(([key, value]) => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = value.label;
        els.categorySelect.appendChild(opt);
      });

      Object.entries(meta.difficulties || {}).forEach(([key, label]) => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = label;
        els.difficultySelect.appendChild(opt);
      });
    }

    function filteredBank() {
      const category = els.categorySelect.value;
      const difficulty = els.difficultySelect.value;
      return bank.filter(q => {
        if (category !== "all" && q.category !== category) return false;
        if (difficulty !== "all" && q.difficulty !== difficulty) return false;
        return true;
      });
    }

    function buildSession() {
      const size = Number(els.sizeSelect.value);
      let list = [];
      if (mode === "set") {
        const set = Number(els.setSelect.value);
        list = bank.filter(q => q.set === set);
      } else if (mode === "wrong") {
        const ids = Object.entries(state.answers)
          .filter(([, answer]) => answer && answer.correct === false)
          .map(([id]) => id);
        list = bank.filter(q => ids.includes(q.id));
      } else if (mode === "bookmarked") {
        list = bank.filter(q => state.bookmarks.includes(q.id));
      } else {
        list = seededShuffle(filteredBank(), Date.now() % 2147483647).slice(0, size);
      }

      if (mode !== "set" && mode !== "random") {
        list = list.filter(q => {
          const category = els.categorySelect.value;
          const difficulty = els.difficultySelect.value;
          if (category !== "all" && q.category !== category) return false;
          if (difficulty !== "all" && q.difficulty !== difficulty) return false;
          return true;
        });
      }

      session = list;
      currentIndex = 0;
      render();
    }

    function currentQuestion() {
      return session[currentIndex];
    }

    function answerQuestion(choiceIndex) {
      const q = currentQuestion();
      if (!q) return;
      const choice = q.choices[choiceIndex];
      state.answers[q.id] = {
        choiceIndex,
        selected: choice.text,
        correct: !!choice.correct,
        answeredAt: new Date().toISOString()
      };
      saveState();
      render();
    }

    function clearCurrentAnswer() {
      const q = currentQuestion();
      if (!q) return;
      delete state.answers[q.id];
      saveState();
      render();
    }

    function toggleBookmark() {
      const q = currentQuestion();
      if (!q) return;
      const idx = state.bookmarks.indexOf(q.id);
      if (idx >= 0) {
        state.bookmarks.splice(idx, 1);
        showToast("북마크 해제");
      } else {
        state.bookmarks.push(q.id);
        showToast("북마크 저장");
      }
      saveState();
      render();
    }

    function render() {
      renderStats();
      renderQuestion();
      renderSheet();
      renderChart();
      renderWeakness();
    }

    function renderStats() {
      const answers = Object.values(state.answers);
      const answered = answers.length;
      const correct = answers.filter(a => a.correct).length;
      const wrong = answers.filter(a => a.correct === false).length;
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      els.answeredStat.textContent = answered;
      els.accuracyStat.textContent = `${accuracy}%`;
      els.wrongStat.textContent = wrong;
      els.bookmarkStat.textContent = state.bookmarks.length;
    }

    function renderQuestion() {
      const q = currentQuestion();
      const total = session.length;

      if (!q) {
        els.questionNumber.textContent = "-";
        els.categoryBadge.textContent = "EMPTY";
        els.categoryBadge.className = "badge tone-slate";
        els.difficultyBadge.textContent = "-";
        els.progressText.textContent = "0 / 0";
        els.progressFill.style.width = "0%";
        els.sentence.innerHTML = '<div class="empty">조건에 맞는 문항이 없습니다.</div>';
        els.choices.innerHTML = "";
        els.feedback.classList.remove("show");
        return;
      }

      const saved = state.answers[q.id];
      const correctIndex = q.choices.findIndex(c => c.correct);

      els.questionNumber.textContent = q.number;
      els.categoryBadge.textContent = q.categoryLabel;
      els.categoryBadge.className = `badge tone-${q.tone}`;
      els.difficultyBadge.textContent = q.difficultyLabel;
      els.difficultyBadge.className = "badge tone-slate";
      els.progressText.textContent = `${currentIndex + 1} / ${total}`;
      els.progressFill.style.width = `${((currentIndex + 1) / Math.max(total, 1)) * 100}%`;
      els.sentence.innerHTML = renderSentence(q.q);

      els.choices.innerHTML = q.choices.map((choice, idx) => {
        let cls = "choice";
        if (saved) {
          if (choice.correct) cls += " correct";
          if (saved.choiceIndex === idx && !choice.correct) cls += " wrong";
          if (saved.choiceIndex !== idx && !choice.correct) cls += " dimmed";
        }
        return `
          <button type="button" class="${cls}" data-choice="${idx}">
            <span class="choice-letter">${letters[idx]}</span>
            <span class="choice-text">${escapeHtml(choice.text)}</span>
          </button>
        `;
      }).join("");

      els.choices.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => answerQuestion(Number(btn.dataset.choice)));
      });

      if (saved) {
        els.feedback.classList.add("show");
        els.feedbackTitle.textContent = saved.correct ? "정답" : `오답 · 정답 ${letters[correctIndex]}`;
        els.feedbackText.innerHTML = explanationHtml(q, saved, correctIndex);
      } else {
        els.feedback.classList.remove("show");
      }

      els.prevBtn.disabled = currentIndex <= 0;
      els.nextBtn.disabled = currentIndex >= total - 1;
      els.bookmarkBtn.textContent = state.bookmarks.includes(q.id) ? "북마크 해제" : "북마크";
    }

    function renderSheet() {
      els.sheetGrid.innerHTML = session.map((q, idx) => {
        const answer = state.answers[q.id];
        let cls = "sheet-btn";
        if (idx === currentIndex) cls += " active";
        if (answer?.correct) cls += " correct";
        if (answer?.correct === false) cls += " wrong";
        return `<button type="button" class="${cls}" data-index="${idx}">${q.number}</button>`;
      }).join("");

      els.sheetGrid.querySelectorAll(".sheet-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          currentIndex = Number(btn.dataset.index);
          render();
        });
      });
    }

    function renderChart() {
      const source = session.length ? session : bank;
      const counts = source.reduce((acc, q) => {
        acc[q.category] = (acc[q.category] || 0) + 1;
        return acc;
      }, {});
      const max = Math.max(...Object.values(counts), 1);
      els.chart.innerHTML = Object.entries(meta.categories || {}).map(([key, item]) => {
        const count = counts[key] || 0;
        const width = Math.round((count / max) * 100);
        return `
          <div class="bar-row">
            <span>${item.label}</span>
            <span class="bar-track"><span class="bar-fill tone-${item.tone}" style="width:${width}%"></span></span>
            <span>${count}</span>
          </div>
        `;
      }).join("");
    }

    function weaknessRows() {
      const byId = new Map(bank.map(q => [q.id, q]));
      const rows = {};
      Object.entries(state.answers).forEach(([id, answer]) => {
        const q = byId.get(id);
        if (!q) return;
        const row = rows[q.category] || {
          key: q.category,
          label: q.categoryLabel,
          tone: q.tone,
          answered: 0,
          wrong: 0
        };
        row.answered += 1;
        if (answer.correct === false) row.wrong += 1;
        rows[q.category] = row;
      });
      return Object.values(rows)
        .filter(row => row.answered > 0)
        .map(row => ({
          ...row,
          rate: Math.round((row.wrong / row.answered) * 100)
        }))
        .sort((a, b) => (b.rate - a.rate) || (b.wrong - a.wrong) || a.label.localeCompare(b.label, "ko"));
    }

    function renderWeakness() {
      const rows = weaknessRows();
      if (!rows.length) {
        els.weaknessPanel.innerHTML = `
          <div class="weakness-summary">문제를 풀면 카테고리별 오답률이 쌓입니다. 처음에는 랜덤 30문제를 풀고 약한 유형을 확인해 보세요.</div>
        `;
        return;
      }
      const worst = rows.find(row => row.wrong > 0) || rows[0];
      const summary = worst.wrong
        ? `${escapeHtml(worst.label)} 오답률이 ${worst.rate}%로 가장 높습니다. 다음 세션은 이 유형만 골라 짧게 복습하는 흐름이 좋습니다.`
        : "아직 틀린 유형이 없습니다. 세트 풀이보다 랜덤 모드로 유형 섞기 연습을 해도 좋습니다.";
      els.weaknessPanel.innerHTML = `
        <div class="weakness-summary">${summary}</div>
        ${rows.slice(0, 5).map(row => `
          <div class="weak-row">
            <div>
              <div class="weak-name">${escapeHtml(row.label)}</div>
              <div class="weak-meta">${row.wrong} wrong / ${row.answered} solved</div>
            </div>
            <div class="weak-rate">${row.rate}%</div>
          </div>
        `).join("")}
      `;
    }

    document.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("[data-mode]").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        mode = btn.dataset.mode;
        buildSession();
      });
    });

    els.buildBtn.addEventListener("click", buildSession);
    els.setSelect.addEventListener("change", () => mode === "set" && buildSession());
    els.categorySelect.addEventListener("change", () => mode !== "set" && buildSession());
    els.difficultySelect.addEventListener("change", () => mode !== "set" && buildSession());
    els.sizeSelect.addEventListener("change", () => mode === "random" && buildSession());
    els.prevBtn.addEventListener("click", () => {
      currentIndex = Math.max(0, currentIndex - 1);
      render();
    });
    els.nextBtn.addEventListener("click", () => {
      currentIndex = Math.min(session.length - 1, currentIndex + 1);
      render();
    });
    els.bookmarkBtn.addEventListener("click", toggleBookmark);
    els.clearAnswerBtn.addEventListener("click", clearCurrentAnswer);
    els.resetBtn.addEventListener("click", () => {
      if (!confirm("학습 기록을 초기화할까요?")) return;
      state.answers = {};
      state.bookmarks = [];
      saveState();
      render();
      showToast("초기화 완료");
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        currentIndex = Math.max(0, currentIndex - 1);
        render();
      } else if (event.key === "ArrowRight") {
        currentIndex = Math.min(session.length - 1, currentIndex + 1);
        render();
      } else if (/^[1-4]$/.test(event.key)) {
        answerQuestion(Number(event.key) - 1);
      }
    });

    populateControls();
    buildSession();
  </script>
</body>
</html>
